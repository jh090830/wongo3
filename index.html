<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바람이 불어오는곳 </title>
</head>
<body>
<h1>시의 예</h1>
    <pre>
        바람이 불어오는 곳
        그곳에 <strong>내 마음이 머무네</strong>

        <span style="color:red;"><b>바람</b>이 그치는 곳
        그곳에 내 <strong>꿈</strong>이 쉬어가네
    </pre>
</body>
</html>
